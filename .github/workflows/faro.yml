name: FARO vigilancia diaria

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC cada dia
  workflow_dispatch:        # ejecucion manual desde la pestana Actions

permissions:
  contents: write

jobs:
  vigilar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ejecutar FARO
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python faro_watch.py

      - name: Commit del historial
        run: |
          git config user.name "faro-bot"
          git config user.email "faro-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "faro: vigilancia $(date -u +%FT%H%M)"
          git push
